# AEP backend configuration template
# Copy to config.yaml and fill in actual values

server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s

db:
  dsn: "postgres://postgres:***@localhost:5432/aep?sslmode=disable"
  max_open: 25
  max_idle: 10

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

chain:
  rpc_url: "${SEPOLIA_RPC}"
  contract_addr: ""  # (optional) main bounty contract
  reputation_addr: ""  # fill after deployment: AEPReputation.sol address
  private_key: "${PRIVATE_KEY}"

# Cobo Agentic Wallet (CAW) — see docs/cobo_setup.md for setup
caw:
  api_key: "${CAW_API_KEY}"
  wallet_id: "${CAW_WALLET_ID}"
  buyer_addr: ""  # Buyer wallet address
  provider_addr: ""  # Provider wallet address
  sub_provider_addr: ""  # Sub-Provider wallet address
  sandbox: true  # false for mainnet
  dev_mode: false  # true to skip real CAW operations during development
  timeout: 10s
  retry:
    max_attempts: 3
    base_delay: 1s

fluxa:
  enabled: false  # FluxA identity service (disabled for demo)
  base_url: "http://localhost:8081"
  timeout: 3s

# LLM provider for dual-track evaluation.
# Supports any OpenAI-compatible API.
# Examples:
#   OpenAI:   api_key="sk-...",  model="gpt-4o",         base_url=""
#   DeepSeek: api_key="sk-...",  model="deepseek-chat",  base_url="https://api.deepseek.com/v1"
openai:
  api_key: "${OPENAI_API_KEY}"
  model: "deepseek-chat"
  base_url: "https://api.deepseek.com/v1"
  timeout: 30s

ipfs:
  pinata_jwt: "${PINATA_JWT}"
  timeout: 30s
  retry:
    max_attempts: 3
    base_delay: 1s

log:
  level: info
  format: json  # json | console
